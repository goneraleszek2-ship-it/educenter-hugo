<!DOCTYPE html>
<html lang="{{ with site.LanguageCode }}{{ . }}{{ else }}en{{ end }}">
{{- partial "head.html" . -}}

<body>
<a href="#main-content" class="skip-link">Skip to content</a>
{{- partial "preloader.html" . -}}
{{- partial "header.html" . -}}
{{ if not .IsHome }}
{{ partial "page-header.html" . }}
{{ end }}
<main id="main-content">
{{- block "main" . }}{{- end }}
</main>
{{- partial "footer.html" . -}}
</body>

</html>
