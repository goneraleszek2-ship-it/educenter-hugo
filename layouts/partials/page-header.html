<!-- page title -->
<section class="page-title-section overlay" style="background-image: url('{{ .Params.Bg_image | relURL}}'),url('{{`images/backgrounds/page-title.jpg`| relURL}}');" >
<div class="container">
<div class="row">
<div class="col-md-8">
<h1 class="text-white font-secondary">{{ .Title }}</h1>
<nav aria-label="breadcrumb">
<ol class="list-inline custom-breadcrumb">
<li class="list-inline-item"><a class="text-primary font-secondary h2" href="{{ site.BaseURL | relLangURL }}">{{ site.Params.home }}</a></li>
<li class="list-inline-item"><i class="ti-angle-right text-white" aria-hidden="true"></i></li>
<li class="list-inline-item text-white font-secondary" aria-current="page">{{ .Title }}</li>
</ol>
</nav>
<p class="text-lighten">{{ .Params.Description | markdownify }}</p>
</div>
</div>
</div>
</section>
