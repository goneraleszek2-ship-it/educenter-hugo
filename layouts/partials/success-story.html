{{ $data := index site.Data site.Language.Lang }}

{{ with $data.homepage.success_story }}
<section class="section bg-cover" data-background="{{ .bg_image | absURL }}">
<div class="container">
<div class="row">
{{ if .video_link }}
<div class="col-lg-6 col-sm-4 position-relative success-video">
<a class="play-btn" href="{{ .video_link | safeURL }}" target="_blank" rel="noopener noreferrer" aria-label="Play success story video">
<i class="ti-control-play" aria-hidden="true"></i>
</a>
</div>
{{ end }}
<div class="col-lg-6 col-sm-8">
<div class="bg-white p-5">
<h2 class="section-title">{{ .title | markdownify }}</h2>
<p>{{ .content | markdownify }}</p>
</div>
</div>
</div>
</div>
</section>
{{ end }}
